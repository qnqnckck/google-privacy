<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>공모주앱 개인정보처리방침</title>
    <style>
      :root {
        color-scheme: light;
        --bg: #f5f3ec;
        --card: #fffdf8;
        --text: #2d342d;
        --muted: #5f685f;
        --accent: #4b7f52;
        --border: #d9d5c9;
      }

      * { box-sizing: border-box; }
      body {
        margin: 0;
        font-family: Arial, sans-serif;
        line-height: 1.6;
        background: var(--bg);
        color: var(--text);
      }
      main {
        max-width: 860px;
        margin: 0 auto;
        padding: 48px 20px 72px;
      }
      .card {
        background: var(--card);
        border: 1px solid var(--border);
        border-radius: 16px;
        padding: 32px;
        box-shadow: 0 10px 30px rgba(0,0,0,0.05);
      }
      h1 { margin-top: 0; font-size: 2rem; }
      p { margin: 0 0 16px; }
      a.button {
        display: inline-block;
        margin-top: 12px;
        padding: 12px 18px;
        border-radius: 999px;
        background: var(--accent);
        color: white;
        text-decoration: none;
        font-weight: 700;
      }
      .meta {
        margin-top: 24px;
        color: var(--muted);
        font-size: 0.95rem;
      }
    </style>
  </head>
  <body>
    <main>
      <section class="card">
        <h1>공모주앱</h1>
        <p>이 사이트는 공모주앱의 공개 개인정보처리방침 페이지입니다.</p>
        <p>공모주 일정 데이터, 캘린더 위젯, 당일 알림 기능에 대한 개인정보 처리 내용을 확인할 수 있습니다.</p>
        <a class="button" href="./publicofferingshares/private-policy.html">개인정보처리방침 보기</a>
        <div class="meta">
          <div>Repository: google-privacy</div>
          <div>문의는 GitHub 저장소 이슈를 통해 접수할 수 있습니다.</div>
        </div>
      </section>
    </main>
  </body>
  </html>
